      - generic [ref=e303]:
        - button "常見問題" [ref=e304] [cursor=pointer]:
          - text: 常見問題
          - img [ref=e305]: expand_more
        - generic [ref=e307]:
          - generic [ref=e308]:
            - heading "一般問題" [level=5] [ref=e309]
            - generic [ref=e310]:
              - paragraph [ref=e311]: "Q: 客變是什麼？什麼時候可以開始？"
              - paragraph [ref=e312]: "A: 客變是預售屋在交屋前依買家需求調整室內配置（格局、水電、建材等）的服務。本建案客變開放時點將另行通知，您可在簽約後先透過公開區與虛擬樣品屋預習，正式開放後系統會以簡訊與 Email 通知您登入。"
            - generic [ref=e313]:
              - paragraph [ref=e314]: "Q: 我可以做哪些客變？哪些不行？"
              - paragraph [ref=e315]: "A: 您可調整非承重牆位、水電插座配置、廚具升級、磁磚選色等。但結構承重牆、共用管道、公共區域設備、建築外觀立面不在客變範圍。詳細規則請參考客變原則區的各類別說明。"
            - generic [ref=e316]:
              - paragraph [ref=e317]: "Q: 是否一定要透過系統申請？可否口頭或紙本？"
              - paragraph [ref=e318]: "A: 為確保所有變更留有正式紀錄並通過合規審核，本案客變一律透過系統線上申請。系統會自動產生確認單並由買家電子簽名，作為日後爭議的依據。"
            - generic [ref=e319]:
              - paragraph [ref=e320]: "Q: 若我不做任何客變，會怎樣？"
              - paragraph [ref=e321]: "A: 完全沒問題。系統預設為標準交屋規格，您只需確認戶型資訊後即可關閉，建案會依標準規格交屋。"
          - generic [ref=e322]:
            - heading "費用與付款" [level=5] [ref=e323]
            - generic [ref=e324]:
              - paragraph [ref=e325]: "Q: 客變費用怎麼計算？"
              - paragraph [ref=e326]: "A: 客變費用分為「加價」（升級項目須加付）與「退款」（取消項目可退費）。各項目費用請參考費用表區的對照表，實際金額以後台審核結果為準。"
            - generic [ref=e327]:
              - paragraph [ref=e328]: "Q: 退料項目（如拆牆）會退錢嗎？"
              - paragraph [ref=e329]: "A: 會。拆除類項目採「退料不退工」原則，建材成本會核退，但拆除工資不退。明細會在費用試算中清楚標示。"
            - generic [ref=e330]:
              - paragraph [ref=e331]: "Q: 客變費用何時繳？"
              - paragraph [ref=e332]: "A: 客變確認後，業務會依建商規範通知繳費時點，通常於施工前繳清。Phase 1 系統不支援線上金流，仍維持銀行匯款。"
            - generic [ref=e333]:
              - paragraph [ref=e334]: "Q: 若申請後反悔可以取消嗎？"
              - paragraph [ref=e335]: "A: 在施工前複確認之前都可修改或取消申請。一旦完成電子簽名複確認，原則上不可再變更。如有特殊狀況，可聯絡業務申請解除鎖定（須走審核流程）。"
          - generic [ref=e336]:
            - heading "時程與截止" [level=5] [ref=e337]
            - generic [ref=e338]:
              - paragraph [ref=e339]: "Q: 每個項目都有截止日嗎？"
              - paragraph [ref=e340]: "A: 是的。各類客變項目依施工順序有不同截止日（如格局類最早、磁磚類較晚）。系統會依您的戶型樓層自動顯示可申請項目與剩餘天數。"
            - generic [ref=e341]:
              - paragraph [ref=e342]: "Q: 超過截止日怎麼辦？"
              - paragraph [ref=e343]: "A: 超過截止日的項目會自動鎖定無法申請。系統會在截止日前一週與三天分別發送提醒通知。建議您及早規劃。"
            - generic [ref=e344]:
              - paragraph [ref=e345]: "Q: 施工前複確認如果我沒回應呢？"
              - paragraph [ref=e346]: "A: 系統會發送複確認通知並提供 7 天回應期。超過 7 天未回應系統自動標記「逾期視為同意」並進入施工程序。我們強烈建議您主動完成確認。"
          - generic [ref=e347]:
            - heading "委託設計師" [level=5] [ref=e348]
            - generic [ref=e349]:
              - paragraph [ref=e350]: "Q: 我能讓設計師代為操作嗎？"
              - paragraph [ref=e351]: "A: 可以。您可在帳號設定中授權「受委託方」帳號給設計師，由設計師代為瀏覽規則、填寫申請、上傳圖面。但最終電子簽名仍須由您本人執行。"
            - generic [ref=e352]:
              - paragraph [ref=e353]: "Q: 如何取消對設計師的授權？"
