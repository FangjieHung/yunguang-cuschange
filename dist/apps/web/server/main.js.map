<swiper [config]="swiperConfig">
  <ng-template swiperSlide *ngFor="let sponsor of sponsors">
    <div class="">
      <img [src]="combineCdnUrl(sponsor.logoFullPath || '')" [alt]="sponsor.name" class="w-full max-w-72 aspect-video object-contain mx-auto">
      <p>{{ sponsor.desc }}</p>
    </div>
  </ng-template>
</swiper>
