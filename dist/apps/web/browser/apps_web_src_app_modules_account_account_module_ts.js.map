<form class="account max-w-md mx-auto" [formGroup]="valForm">
  <web-glass-bg>
    <div class="inner-wrap">
      <section class="form-section">
        <h3 class="title">重設密碼</h3>
        <ul class="input-group">
          <li>
            <div class="form-label">原密碼 <span class="required-mark" *ngIf="f['oldPassword'] | ctrlHasRequired">*</span>
            </div>
            <mat-form-field appearance="outline" class="w-full fill-black">
              <input matInput [type]="passwordHide ? 'password' : 'text'" formControlName="oldPassword"
                [required]="f['oldPassword'] | ctrlHasRequired">
              <button mat-icon-button matSuffix (click)="passwordHide = !passwordHide" [attr.aria-label]="'不顯示密碼'"
                [attr.aria-pressed]="passwordHide">
                <mat-icon class="min-w-8">{{passwordHide ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
              <mat-error class="text-xs" *ngIf="f['oldPassword'].errors">
                <div *ngFor="let msg of formHelper.errorMsgs(f['oldPassword'].errors, '原密碼')">{{ msg }}</div>
              </mat-error>
            </mat-form-field>
          </li>
          <li>
            <div class="form-label">新密碼 <span class="required-mark" *ngIf="f['newPassword'] | ctrlHasRequired">*</span>
            </div>
            <mat-form-field appearance="outline" class="w-full fill-black">
              <input matInput [type]="passwordHide ? 'password' : 'text'" formControlName="newPassword"
                [required]="f['newPassword'] | ctrlHasRequired">
              <button mat-icon-button matSuffix (click)="passwordHide = !passwordHide" [attr.aria-label]="'不顯示密碼'"
                [attr.aria-pressed]="passwordHide">
                <mat-icon class="min-w-8">{{passwordHide ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
              <mat-error class="text-xs" *ngIf="f['newPassword'].errors">
                <div *ngFor="let msg of formHelper.errorMsgs(f['newPassword'].errors, '新密碼')">{{ msg }}</div>
              </mat-error>
            </mat-form-field>
          </li>
          <li>
            <div class="form-label">再次確認新密碼 <span class="required-mark" *ngIf="f['confirmNewPassword'] | ctrlHasRequired">*</span>
            </div>
            <mat-form-field appearance="outline" class="w-full fill-black">
              <input matInput [type]="passwordHide ? 'password' : 'text'" formControlName="confirmNewPassword"
                [required]="f['confirmNewPassword'] | ctrlHasRequired">
              <button mat-icon-button matSuffix (click)="passwordHide = !passwordHide" [attr.aria-label]="'不顯示密碼'"
                [attr.aria-pressed]="passwordHide">
                <mat-icon class="min-w-8">{{passwordHide ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
              <mat-error class="text-xs" *ngIf="f['confirmNewPassword'].errors">
                <div *ngFor="let msg of formHelper.errorMsgs(f['confirmNewPassword'].errors, '再次確認新密碼')">{{ msg }}</div>
              </mat-error>
            </mat-form-field>
          </li>
        </ul>
      </section>
    </div>

  </web-glass-bg>
  <div class="toolbar">
    <button class="btn-primary btn-lg" (click)="onSubmit()">確定更改</button>
  </div>
</form>
