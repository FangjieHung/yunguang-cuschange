<div class="flex items-center justify-center px-4 md:pb-10">

  <web-glass-bg class="block w-full mx-auto md:max-w-sm">
      <div class="p-6">
        <h1 class="text-2xl font-bold text-center mb-5 mt-2">歡迎回來!</h1>

        <form [formGroup]="validateForm">
          <ul class="space-y-5">
            <li>
              <div class="form-label">
                <p>帳號<span class="required-mark">*</span></p>
              </div>
              <mat-form-field appearance="outline" class="w-full fill-black">
                <input matInput type="text" formControlName="account" [required]="f['account'] | ctrlHasRequired">
                <mat-error class="text-sm" *ngIf="f['account'].errors">
                  <div *ngFor="let msg of formHelper.errorMsgs(f['account'].errors, '帳號')">{{ msg }}</div>
                </mat-error>
              </mat-form-field>
            </li>

            <li>
              <div class="form-label">
                <p>密碼<span class="required-mark">*</span></p>
              </div>
              <mat-form-field appearance="outline" class="w-full fill-black">
                <input matInput type="password" formControlName="password" [required]="f['password'] | ctrlHasRequired"
                  [type]="hidePassword ? 'password' : 'text'" (keydown.enter)="onSubmit()">
                <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword"
                  [attr.aria-label]="'hide password'" [attr.aria-pressed]="hidePassword">
                  <span class="material-symbols-rounded">{{hidePassword ? 'visibility_off' : 'visibility'}}</span>
                </button>
                <mat-error class="text-sm" *ngIf="f['password'].errors">
                  <div *ngFor="let msg of formHelper.errorMsgs(f['password'].errors, '密碼')">{{ msg }}</div>
                </mat-error>
              </mat-form-field>
            </li>
          </ul>

          <div class="mb-5 space-y-5">
            <div class="flex justify-between items-center">
              <mat-checkbox color="primary"><span class="text-base -ml-2">記住我</span></mat-checkbox>
              <a class="btn-text" routerLink="/auth/forget-password">忘記密碼?</a>
            </div>
            <button class="btn-primary btn-lg" (click)="onSubmit()">登入</button>
            <a routerLink="/auth/signup" class="btn-lg">註冊</a>
          </div>
        </form>

        <p class="text-center text-sm m-auto text-slate-500 mt-auto mb-0">登入或註冊即表示您同意我們的
          <a target="_blank" routerLink="/about/privacy">隱私權</a>與<a target="_blank" routerLink="/about/terms">服務政策</a>
        </p>
      </div>
    </web-glass-bg>
</div>
