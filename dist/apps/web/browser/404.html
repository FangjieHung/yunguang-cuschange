<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>重定向...</title>
    <script type="text/javascript">
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/yunguang-cuschange/?/' + l.pathname.slice(1).split('/').slice(1).join('/') +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
