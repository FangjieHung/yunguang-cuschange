<div class="max-w-container">
  <header>
    <web-complete *ngIf="isSuccess" class="block w-fit mx-auto pl-4"></web-complete>
    <web-pending *ngIf="!isSuccess" class="block w-fit mx-auto pl-4"></web-pending>
    <h2 class="text-center">
       <span class="display d-black">Payment Status</span>                               
      <p class="headline font-semibold space-x-2">
        <span>{{ message }}</span>
        <span [ngClass]="isSuccess ? 'result-success' : 'result-pending'">{{ resultMsg }}</span>
      </p>
    </h2>
  </header>

  <!-- 付款失敗或待超商繳款 -->
  <web-glass-bg class="w-fit max-w-xl mx-auto my-10 block">
    <div class="px-8 py-6">
      <h1 class="title">付款處理說明</h1>
      <div class="text-base mt-2 mb-6 space-y-2">
        <p>若您選擇非即時金流付款方式（如 ATM 轉帳、超商代碼繳費等），系統可能無法立即確認入帳狀態。</p>
        <p>請耐心等待 1-3 個工作天，款項入帳後系統將自動更新您的訂單狀態，並發送確認通知。</p>
        <p>如有任何疑問，請聯繫學會秘書處。</p>
      </div>
      <a routerLink="/" class="btn-primary rounded-full p-4 w-32 mx-auto">回首頁</a>
    </div>
  </web-glass-bg>
</div>
