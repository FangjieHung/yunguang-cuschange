<div class="loading-container" [ngClass]="type">

  <ng-container *ngIf="type === 'skeleton'">
    <div class="w-full rounded-md opacity-10">
      <div class="animate-pulse space-y-6 py-1">
        <div class="h-2 w-1/3 rounded bg-current"></div>
        <div class="space-y-3">
          <div class="grid grid-cols-3 gap-4">
            <div class="col-span-2 h-2 rounded bg-current"></div>
            <div class="col-span-1 h-2 rounded bg-current"></div>
          </div>
          <div class="grid grid-cols-3 gap-4">
            <div class="col-span-1 h-2 rounded bg-current"></div>
            <div class="col-span-2 h-2 rounded bg-current"></div>
          </div>
          <div class="h-2 rounded bg-current"></div>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="type === 'spinner'">
    <div class="spinner-circle"></div>
    <p *ngIf="message" class="spinner-message">{{ message }}</p>
  </ng-container>
</div>
