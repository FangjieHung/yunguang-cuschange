<div class="space-y-4">
    <div class="flex items-center w-full">
        <label *ngIf="!selectedFile" for="bbd-file-upload"
            class="flex flex-col items-center justify-center w-full h-34 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                <svg class="w-8 h-8 mb-4 text-gray-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 20 16">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2" />
                </svg>
                <p class="mb-2 text-sm text-gray-500"><span class="font-semibold">Upload</span></p>
                <!-- <p class="text-xs text-gray-500">SVG, PNG, JPG or GIF (MAX. 800x400px)</p> -->
            </div>
            <input id="bbd-file-upload" type="file" class="hidden" (change)="onFileChange($event)" />
        </label>

        <div *ngIf="selectedFile" class="mt-2 flex space-x-4">
            <a (click)="doOpenFile()" class="text-blue-600 hover:underline">
                {{ fileName }}
            </a>
            <button (click)="remove()"
                class="bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center hover:bg-red-700">
                ✕
            </button>
        </div>
    </div>
</div>
