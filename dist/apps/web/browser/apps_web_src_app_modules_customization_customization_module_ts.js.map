<section class="submit-page">
  <header class="submit-page__head">
    <span class="eyebrow">送出申請</span>
    <h1 class="display-2">最終確認</h1>
    <p class="body-lg">請最後確認您的客變申請內容。送出後將進入審核流程。</p>
  </header>

  <empty-state
    *ngIf="!version"
    icon="error_outline"
    title="尚未選定方案"
    message="請至比較清單選擇要送出的方案。"
    ctaLabel="前往比較清單"
    ctaRoute="/customization/my-list"
  ></empty-state>

  <div class="submit-confirm card" *ngIf="version">
    <div class="submit-confirm__meta">
      <info-tile label="戶號" [value]="buyer.unit"></info-tile>
      <info-tile label="所有權人" [value]="buyer.ownerName"></info-tile>
      <info-tile label="申請方案" [value]="version.name"></info-tile>
    </div>

    <section class="submit-confirm__section">
      <h3 class="submit-confirm__category">建材選擇</h3>
      <ul class="submit-materials">
        <li class="submit-materials__item" *ngFor="let entry of version.entries">
          <div class="submit-materials__thumb">
            <img [src]="entry.optionImage" [alt]="entry.optionName" />
          </div>
          <div class="submit-materials__meta">
            <small>{{ entry.categoryTitle }}</small>
            <strong>{{ entry.optionName }}</strong>
          </div>
          <span class="submit-materials__fee"
            [class.submit-materials__fee--add]="entry.priceDelta > 0">
            <ng-container *ngIf="entry.priceDelta > 0">
              +NT$ {{ entry.priceDelta | number }}
            </ng-container>
            <ng-container *ngIf="!entry.priceDelta">標配</ng-container>
          </span>
        </li>
      </ul>
    </section>

    <div class="submit-confirm__total card">
      <span>加價合計</span>
      <strong>+NT$ {{ totalDelta | number }}</strong>
    </div>

    <div class="submit-confirm__agreement">
      <mat-checkbox [(ngModel)]="agreed" color="primary">
        我已閱讀並同意客變規則、費用條款與施工條件。
      </mat-checkbox>
    </div>

    <footer class="submit-confirm__actions">
      <button type="button" class="btn btn-ghost" (click)="back()">
        <mat-icon>arrow_back</mat-icon>返回修改
      </button>
      <button
        type="button"
        class="btn btn-primary btn-lg"
        [disabled]="!agreed"
        (click)="submit()"
      >
        <mat-icon>send</mat-icon>送出申請
      </button>
    </footer>
  </div>
</section>
