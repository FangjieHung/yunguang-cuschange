<div class="px-2 py-4">
  <ng-container *ngIf="cannotRenew; else renewForm">
    <p class="mb-4 text-base text-orange-600">
      {{ modalData.actionName }} 合約已續約至最大年度，無法再續約。
    </p>
    <div class="flex justify-end mt-4">
      <button mat-raised-button (click)="onCancel()">關閉</button>
    </div>
  </ng-container>

  <ng-template #renewForm>
    <p class="mb-4 text-base">請選擇要產生會費繳費單的年度：</p>
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>繳費年度</mat-label>
      <mat-select [(ngModel)]="selectedYear">
        <mat-option *ngFor="let year of yearOptions" [value]="year">
          {{ year }} 年度
        </mat-option>
      </mat-select>
    </mat-form-field>
    <p class="mt-2 text-sm text-gray-500">
      確定要為{{ modalData.actionName }}產生 {{ selectedYear }} 年度常年會費繳費單？
    </p>
    <div class="flex justify-end gap-x-2 mt-4">
      <button mat-button (click)="onCancel()">取消</button>
      <button mat-raised-button color="primary" (click)="onConfirm()">確定產生</button>
    </div>
  </ng-template>
</div>
