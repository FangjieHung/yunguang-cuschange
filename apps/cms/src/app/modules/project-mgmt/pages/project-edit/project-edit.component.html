<section class="project-edit-page">
  <header class="page-header">
    <h1 class="display-2">
      {{ isNewProject ? '新增建案' : '編輯建案' }}
    </h1>
  </header>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="project-form" *ngIf="!isLoading">
    <div class="form-section">
      <h2 class="section-title">基本資訊</h2>

      <div class="form-group">
        <label for="name">建案名稱 <span class="required">*</span></label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="例：富華澐光"
          class="form-control"
        />
        <div class="form-error" *ngIf="form.get('name')?.hasError('required')">
          建案名稱為必填
        </div>
        <div class="form-error" *ngIf="form.get('name')?.hasError('minlength')">
          建案名稱至少需2個字
        </div>
      </div>

      <div class="form-group">
        <label for="code">建案代碼 <span class="required">*</span></label>
        <input
          id="code"
          type="text"
          formControlName="code"
          placeholder="例：PROJECT-001"
          class="form-control"
        />
        <div class="form-error" *ngIf="form.get('code')?.hasError('required')">
          建案代碼為必填
        </div>
        <div class="form-error" *ngIf="form.get('code')?.hasError('minlength')">
          建案代碼至少需2個字
        </div>
      </div>

      <div class="form-group">
        <label for="status">建案狀態 <span class="required">*</span></label>
        <select id="status" formControlName="status" class="form-control">
          <option value="active">進行中</option>
          <option value="closed">已結束</option>
        </select>
        <div class="form-error" *ngIf="form.get('status')?.hasError('required')">
          建案狀態為必填
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2 class="section-title">日期與戶數</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="startDate">開始日期 <span class="required">*</span></label>
          <input
            id="startDate"
            type="date"
            formControlName="startDate"
            class="form-control"
          />
          <div class="form-error" *ngIf="form.get('startDate')?.hasError('required')">
            開始日期為必填
          </div>
        </div>

        <div class="form-group">
          <label for="endDate">結束日期 <span class="required">*</span></label>
          <input
            id="endDate"
            type="date"
            formControlName="endDate"
            class="form-control"
          />
          <div class="form-error" *ngIf="form.get('endDate')?.hasError('required')">
            結束日期為必填
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="totalUnits">總戶數 <span class="required">*</span></label>
        <input
          id="totalUnits"
          type="number"
          formControlName="totalUnits"
          min="1"
          class="form-control"
        />
        <div class="form-error" *ngIf="form.get('totalUnits')?.hasError('required')">
          總戶數為必填
        </div>
        <div class="form-error" *ngIf="form.get('totalUnits')?.hasError('min')">
          總戶數需大於0
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button
        type="button"
        class="btn btn-ghost"
        (click)="onCancel()"
        [disabled]="isSubmitting"
      >
        取消
      </button>
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="form.invalid || isSubmitting"
      >
        {{ isSubmitting ? '保存中...' : '保存' }}
      </button>
    </div>
  </form>

  <div class="loading" *ngIf="isLoading">
    <mat-spinner></mat-spinner>
    <p>正在載入建案資訊...</p>
  </div>
</section>
