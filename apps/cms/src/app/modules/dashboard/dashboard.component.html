<section class="dashboard-page">
  <header class="dashboard-page__header">
    <h1 class="display-2">儀表板</h1>
    <p class="body-lg">全棟戶況概覽與審核進度</p>
  </header>

  <!-- KPI Cards Row -->
  <div class="dashboard-grid">
    <cms-kpi-card
      label="已送出申請"
      [value]="dashboardStats().totalSubmitted"
      icon="description"
    ></cms-kpi-card>

    <cms-kpi-card
      label="審核中"
      [value]="dashboardStats().underReview"
      icon="schedule"
      variant="warning"
    ></cms-kpi-card>

    <cms-kpi-card
      label="已批准"
      [value]="dashboardStats().approved"
      icon="check_circle"
      variant="success"
    ></cms-kpi-card>

    <cms-kpi-card
      label="需返工"
      [value]="dashboardStats().needsRework"
      icon="error"
      variant="danger"
    ></cms-kpi-card>

    <cms-kpi-card
      label="待複確認"
      [value]="dashboardStats().needsConfirmation"
      icon="pending_actions"
      variant="info"
    ></cms-kpi-card>

    <cms-kpi-card
      label="加價合計"
      [value]="'+NT$ ' + (dashboardStats().totalAddOn | number)"
      icon="trending_up"
      subtext="待複確認"
    ></cms-kpi-card>
  </div>

  <!-- Progress Bar -->
  <div class="progress-section">
    <h3 class="title-lg">審核進度</h3>
    <div class="progress-bar">
      <div class="progress-bar__fill" [style.width.%]="getProgressPercent()"></div>
    </div>
    <p class="body-md">{{ getProgressPercent() }}% 完成</p>
  </div>

  <!-- Charts Section -->
  <div class="charts-section">
    <h3 class="title-lg">數據分析</h3>

    <div class="charts-grid">
      <cms-chart
        title="申請狀態分布"
        type="doughnut"
        [chartData]="statusChartData"
      ></cms-chart>

      <cms-chart
        title="費用分析"
        type="bar"
        [chartData]="feeChartData"
      ></cms-chart>
    </div>

    <div class="charts-full">
      <cms-chart
        title="申請趨勢"
        type="line"
        [chartData]="trendChartData"
      ></cms-chart>
    </div>
  </div>

  <!-- Recent Applications List -->
  <div class="applications-section">
    <h3 class="title-lg">最近申請</h3>
    <cms-application-list
      [applications]="applications()"
      [pageSize]="10"
      [enableFiltering]="true"
      (applicationSelect)="onApplicationSelect($event)"
    ></cms-application-list>
  </div>
</section>
