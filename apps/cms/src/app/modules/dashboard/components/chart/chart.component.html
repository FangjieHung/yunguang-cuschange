<div class="chart-card">
  <div class="chart-card__header">
    <h3 class="chart-card__title">{{ title }}</h3>
  </div>
  <div class="chart-card__body">
    <canvas
      *ngIf="type === 'line'"
      baseChart
      [data]="chartData"
      [options]="chartOptions"
      type="line"
    ></canvas>
    <canvas
      *ngIf="type === 'bar'"
      baseChart
      [data]="chartData"
      [options]="chartOptions"
      type="bar"
    ></canvas>
    <canvas
      *ngIf="type === 'doughnut'"
      baseChart
      [data]="chartData"
      [options]="chartOptions"
      type="doughnut"
    ></canvas>
  </div>
</div>
