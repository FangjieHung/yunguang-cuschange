<div class="">
  <form [formGroup]="valForm">
    <div class="grid grid-cols-12 gap-x-4">
      <div class="col-span-12 my-5 flex items-center gap-4 before:h-px before:flex-1 before:bg-gray-300  before:content-[''] after:h-px after:flex-1 after:bg-gray-300  after:content-['']">
        <span class="text-base">團體資料</span>
      </div>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-4">
        <mat-label>統一編號</mat-label>
        <input matInput type="text" formControlName="taxId" [required]="f['taxId'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['taxId'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['taxId'].errors, '統一編號')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-8">
        <mat-label>名稱</mat-label>
        <input matInput type="text" formControlName="name" [required]="f['name'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['name'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['name'].errors, '名稱')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-3">
        <mat-label>聯絡電話</mat-label>
        <input matInput type="text" formControlName="phone" [required]="f['phone'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['phone'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['phone'].errors, '聯絡電話')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-3">
        <mat-label>分機</mat-label>
        <input matInput type="text" formControlName="phoneExt" [required]="f['phoneExt'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['phoneExt'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['phoneExt'].errors, '分機')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-6">
        <mat-label>電子信箱</mat-label>
        <input matInput type="text" formControlName="email" [required]="f['email'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['email'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['email'].errors, '電子信箱')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>

      <bbd-zip-code-control #currZipCode class="w-full col-span-full sm:col-span-6" formControlName="currZipCodeId"
        title="聯絡" [required]="f['currZipCodeId'] | ctrlHasRequired">
      </bbd-zip-code-control>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-6">
        <mat-label>聯絡地址</mat-label>
        <input matInput type="text" formControlName="currAddr" [required]="f['currAddr'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['currAddr'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['currAddr'].errors, '聯絡地址')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>

      <div class="col-span-12 my-5 flex items-center gap-4 before:h-px before:flex-1 before:bg-gray-300  before:content-[''] after:h-px after:flex-1 after:bg-gray-300  after:content-['']">
        <span class="text-base">負責人</span>
      </div>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-6">
        <mat-label>姓名</mat-label>
        <input matInput type="text" formControlName="owner" [required]="f['owner'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['owner'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['owner'].errors, '負責人姓名')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-6">
        <mat-label>職稱</mat-label>
        <input matInput type="text" formControlName="ownerTitle" [required]="f['ownerTitle'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['ownerTitle'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['ownerTitle'].errors, '負責人職稱')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>

      <div class="col-span-12 my-5 flex items-center gap-4 before:h-px before:flex-1 before:bg-gray-300  before:content-[''] after:h-px after:flex-1 after:bg-gray-300  after:content-['']">
        <span class="text-base">會員代表</span>
      </div>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-8">
        <mat-label>姓名</mat-label>
        <input matInput type="text" formControlName="cpName" [required]="f['cpName'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['cpName'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['cpName'].errors, '代表人姓名')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-4">
        <mat-label>職稱</mat-label>
        <input matInput type="text" formControlName="cpTitle" [required]="f['cpTitle'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['cpTitle'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['cpTitle'].errors, '代表人職稱')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-4">
        <mat-label>身分證號</mat-label>
        <input matInput type="text" formControlName="cpIdNo" [required]="f['cpIdNo'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['cpIdNo'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['cpIdNo'].errors, '代表人身分證號')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-4">
        <mat-label>出生日期</mat-label>
        <input matInput [matDatepicker]="birthAtDatepicker" formControlName="cpBirthAt"
          [required]="f['cpBirthAt'] | ctrlHasRequired">
        <mat-datepicker-toggle [for]="birthAtDatepicker" matSuffix></mat-datepicker-toggle>
        <mat-datepicker #birthAtDatepicker></mat-datepicker>
        <mat-error class="text-xs" *ngIf="f['cpBirthAt'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['cpBirthAt'].errors, '代表人出生日期')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-4">
        <mat-label>性別</mat-label>
        <mat-select formControlName="cpGender" [required]="f['cpGender'] | ctrlHasRequired">
          <ng-container *ngFor="let opt of sharedDataServ.genderOpts">
            <mat-option [value]="opt.value">{{ opt.name }}</mat-option>
          </ng-container>
        </mat-select>
        <mat-error class="text-xs" *ngIf="f['cpGender'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['cpGender'].errors, '代表人性別')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-4">
        <mat-label>聯絡手機</mat-label>
        <input matInput type="text" formControlName="cpMobile" [required]="f['cpMobile'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['cpMobile'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['cpMobile'].errors, '代表人聯絡手機')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-8">
        <mat-label>電子信箱</mat-label>
        <input matInput type="text" formControlName="cpEmail" [required]="f['cpEmail'] | ctrlHasRequired">
        <mat-error class="text-xs" *ngIf="f['cpEmail'].errors">
          <div *ngFor="let msg of formHelper.errorMsgs(f['cpEmail'].errors, '代表人電子信箱')">{{ msg }}</div>
        </mat-error>
      </mat-form-field>

      <ng-container formGroupName="contentJto">
        <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-6">
          <mat-label>學歷</mat-label>
          <textarea matInput formControlName="cpEducation" rows="8" placeholder="代表人學歷..." [required]="f['cpEducation'] | ctrlHasRequired">
          </textarea>
          <mat-error class="text-xs" *ngIf="f['contentJto'].get('cpEducation')?.errors">
            <div *ngFor="let msg of formHelper.errorMsgs(f['contentJto'].get('cpEducation')?.errors, '學歷')">{{ msg }}</div>
          </mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-full col-span-full sm:col-span-6">
          <mat-label>經歷</mat-label>
          <textarea matInput formControlName="cpExperience" rows="8" placeholder="代表人經歷..." [required]="f['cpExperience'] | ctrlHasRequired">
          </textarea>
          <mat-error class="text-xs" *ngIf="f['contentJto'].get('cpExperience')?.errors">
            <div *ngFor="let msg of formHelper.errorMsgs(f['contentJto'].get('cpExperience')?.errors, '經歷')">{{ msg }}</div>
          </mat-error>
        </mat-form-field>
      </ng-container>
    </div>
  </form>
</div>
