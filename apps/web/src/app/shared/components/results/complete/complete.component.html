<div class="min-h-container max-w-container mt-20">
    <div class="md:flex items-start justify-center">
        <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
            <circle class="path circle" fill="none" stroke="var(--md-sys-color-primary)" stroke-width="10"
                stroke-miterlimit="10" cx="80" cy="80" r="70" />
            <polyline class="path check" points="115.2 55.7 66.5 104.3 44.8 83" fill="none" stroke="var(--md-sys-color-primary)" stroke-width="10"
                stroke-linecap="round" stroke-miterlimit="10" />
        </svg>
        <div class="fade-in-left">
            <h1 class="display">Complete!</h1>            
            <div class="w-full max-w-md mx-auto mt-10 space-y-5">

            <a class="link-underline" routerLink="/auth/signin">
                <span>立即登入</span><span class="material-symbols-rounded">arrow_right_alt</span>
              </a>
            </div>
        </div>
    </div>
</div>
