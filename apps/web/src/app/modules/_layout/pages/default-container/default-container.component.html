<nav class="nav-bar">
    <a routerLink="/">
        <img id="logoImg" #logoImg src="assets/image/logo/mark.png" alt="logo">
    </a>

    <div class="ml-auto mt-3 flex items-center space-x-4">
        <web-glass-bg class="container-hover hidden lg:block">
            <div class="flex items-center">
                <ng-container *ngFor="let menu of navList">
                    <div class="menu-wrap" *ngIf="menu.children; else singleLink">
                        <button mat-button (click)="toggleNavbarMenu(menu.label)"
                            [class.active]="activeMenu === menu.label" class="nav-link">{{ menu.label }}</button>
                        <div [class.show]="activeMenu === menu.label" class="menu-list">
                            <web-glass-bg class="container-hover">
                                <a *ngFor="let item of menu.children" (click)="closeNavbarMenu()"
                                    [routerLink]="item.link">
                                    {{ item.label }}
                                </a>
                            </web-glass-bg>
                        </div>
                    </div>
                    <ng-template #singleLink>
                        <a mat-button class="nav-link" [routerLink]="menu.link">
                            {{ menu.label }}
                        </a>
                    </ng-template>
                </ng-container>
            </div>
        </web-glass-bg>

        <web-glass-bg class="container-hover">
            <div class="flex items-center px-1">
                <div *ngIf="!isSignin" class="items-center hidden lg:flex">
                    <a mat-button class="nav-link" routerLink="/auth/signup">註冊</a>
                    <span>/</span>
                    <a mat-button class="nav-link" routerLink="/auth/signin">登入</a>
                </div>

                <div *ngIf="isSignin" class="flex items-center">
                    <div class="menu-wrap">
                        <button (click)="toggleSingleMenu()" [class.active]="isMenuOpen" class="avatar-btn nav-links">
                            <span class="user">{{ (currUserInfo?.name || '-').charAt(0) }}</span>
                        </button>

                        <div class="menu-list" (click)="closeNavbarMenu()" [class.show]="isMenuOpen">
                            <web-glass-bg class="container-hover">
                                <a routerLink="/account/profile">個人資料</a>
                                <button (click)="appAuthApiServ.signout()">登出</button>
                            </web-glass-bg>
                        </div>
                    </div>
                </div>

                <div class="lg:hidden">
                    <button (click)="toggleSideMenu()" class="h-12 w-10">
                        <span class="material-symbols-rounded" *ngIf="!snav?.opened">menu</span>
                        <span class="material-symbols-rounded" *ngIf="snav?.opened">menu_open</span>
                    </button>
                </div>
            </div>
        </web-glass-bg>
    </div>
</nav>

<mat-sidenav-container hasBackdrop="false">
    <!-- Mobile Menu -->
    <mat-sidenav #snav mode="over" position="end" class="sidenav-container">

        <div class="sidemenu-inner">
            <mat-nav-list class="sidenav-list">
                <a *ngFor="let menu of navList" [routerLink]="menu.link" (click)="snav.close()">
                    {{ menu.label }}
                </a>
            </mat-nav-list>
            <mat-nav-list class="sidenav-list">
                <a (click)="snav.close()">
                    <span *ngIf="!isSignin" routerLink="/auth/signin">會員登入</span>
                    <div *ngIf="isSignin" class="flex justify-between">
                        <span class="truncate w-24">Hi! {{ (currUserInfo?.name || '-') }} </span>

                    </div>
                </a>
                <div *ngIf="isSignin">
                    <a *ngFor="let item of accountMenu" [routerLink]="item.link" (click)="snav.close()">{{ item.label
                        }}
                    </a>
                    <div class="border-t border-white/30 pt-3 mt-3">
                        <a routerLink="/account/reset-password" (click)="snav.close()">密碼修改</a>
                        <button (click)="appAuthApiServ.signout();snav.close();">登出</button>
                    </div>
                </div>
            </mat-nav-list>

            <section>
                <ul class="web-map">
                    <li *ngIf="('PHONE' | aryFindValue: (response?.contactDetails || []): 'name': 'value') as phone">
                        <span class="label">phone</span>
                        <p>{{ phone }}</p>
                    </li>
                    <li *ngIf="('FAX' | aryFindValue: (response?.contactDetails || []): 'name': 'value') as fax">
                        <span class="label">fax</span>
                        <p>{{ fax }}</p>
                    </li>
                    <li
                        *ngIf="('OPENING HOURS' | aryFindValue: (response?.contactDetails || []): 'name': 'value') as opening">
                        <span class="label">Opening Hours</span>
                        <p>{{ opening }}</p>
                    </li>
                </ul>

                <div class="social-icon-wrap">
                    <a target="_blank" [attr.href]="fbUrl" rel="noopener noreferrer"
                        *ngIf="('Facebook' | aryFindValue: (response?.socialMedia || []): 'name': 'url') as fbUrl">
                        <img src="assets/image/icon/fb.webp" alt="facebook">
                    </a>
                    <a target="_blank" [attr.href]="igUrl"
                        *ngIf="('Instagram' | aryFindValue: (response?.socialMedia || []): 'name': 'url') as igUrl">
                        <img src="assets/image/icon/ig.webp" alt="instagram">
                    </a>
                    <a target="_blank" [attr.href]="ytUrl"
                        *ngIf="('Youtube' | aryFindValue: (response?.socialMedia || []): 'name': 'url') as ytUrl">
                        <img src="assets/image/icon/yt.webp" alt="youtube">
                    </a>
                </div>
            </section>
        </div>
    </mat-sidenav>

    <mat-sidenav-content>
        <div class="floating-bg">
            <img src="/assets/image/illustration/sphere-001.webp" alt="" class="sphere-01">
            <img src="/assets/image/illustration/sphere-002.webp" alt="" class="sphere-02">
        </div>
        <div class="main-container">
            <router-outlet></router-outlet>
        </div>
        <web-footer></web-footer>
    </mat-sidenav-content>
</mat-sidenav-container>
