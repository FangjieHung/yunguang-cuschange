<section class="floating-bg">
    <img src="/assets/image/illustration/sphere-001.webp" alt="" class="sphere-01">
    <img src="/assets/image/illustration/sphere-002.webp" alt="" class="sphere-02">
</section>

<div class="relative">

    <header class="hero">
        <video autoplay loop muted class="hero-video">
            <source src="/assets/video/hero-landscape.webm" media="(min-width: 1024px)" type="video/mp4">

        </video>

        <div class="content max-w-container">
            <h1 class="display">
                Innovating for Smarter Diagnostics
            </h1>
            <h1 class="headline"><span>智慧檢驗，</span><span>守護健康的<br>第一道防線</span></h1>
            <p class="text-xl tracking-wide">歡迎加入智慧檢驗醫學學會，共同推動檢驗醫學的創新與發展。</p>
        </div>
    </header>


    <section class="max-w-container min-h-[80svh]">
        <h2 class="">
            <span class="display">Academic Activities</span>
            <p class="headline">學術活動</p>
        </h2>
        <div class="">
            <swiper [spaceBetween]="32" [navigation]="true" [slidesPerView]="3" class="w-full">
                <ng-template swiperSlide *ngFor="let news of newsList">
                    <a href="">
                        <span class="date"> {{ news.date }}</span>
                        <span class="sort">{{ news.sort }}</span>
                        <h3> {{ news.title }}</h3>
                    </a>
                </ng-template>
            </swiper>
        </div>
        

        <web-glass-bg class="block my-10">
            <a class="link" target="_blank">
                看更多消息<span class="material-symbols-rounded pl-2">arrow_right_alt</span>
            </a>
        </web-glass-bg>
    </section>

    <section class="max-w-container min-h-[80svh] flex items-start lg:flex-row-reverse">
        <div class="flex flex-col self-stretch justify-between items-end">
            <h2 class="text-right">
                <span class="display">Latest News</span>
                <p class="headline">最新消息</p>
            </h2>

            <mat-button-toggle-group name="newsSort" aria-label="News Sort" *ngIf="false">
                <mat-button-toggle value="所有消息">所有消息</mat-button-toggle>
                <mat-button-toggle value="學會公告">學會公告</mat-button-toggle>
                <mat-button-toggle value="活動訊息">活動訊息</mat-button-toggle>
            </mat-button-toggle-group>

            <web-glass-bg class="block my-10">
                <a class="link" target="_blank">
                    看更多消息<span class="material-symbols-rounded pl-2">arrow_right_alt</span>
                </a>
            </web-glass-bg>
        </div>
        <div class="news-list">
            <a *ngFor="let news of newsList">

                <span class="date"> {{ news.date }}</span>
                <span class="sort">{{ news.sort }}</span>

                <h3> {{ news.title }}</h3>
            </a>
        </div>
    </section>


</div>
