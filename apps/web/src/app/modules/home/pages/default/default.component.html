<div class="max-w-container">
    <div class="space-y-5 mx-auto w-full">
        <header class="basic-header">
            <h1>專案列表</h1>
            <a mat-flat-button color="primary" [attr.href]="'/project/edit'" class="h-10"><span
                    class="material-symbols-outlined">add</span><span>新增專案</span></a>
        </header>
        <form>
            <mat-form-field appearance="outline" class="fill-white w-full max-w-2xl">
                <span matPrefix class="material-symbols-outlined">
                    search
                </span>
                <input type="text" placeholder="搜尋專案名稱或地址" matInput [formControl]="searchControl"
                    [matAutocomplete]="auto" [(ngModel)]="request.queryRequest.queryString"
                    (keydown.enter)="onSearch()">
                <mat-hint>輸入後請按下 Enter 鍵搜尋</mat-hint>
                <button *ngIf="searchValue" matSuffix mat-icon-button aria-label="Clear" (click)="searchValue=''">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <mat-autocomplete #auto="matAutocomplete">
                    <!-- <mat-option *ngFor="let option of searchOptions" [value]="option">
                        {{ option }}
                    </mat-option> -->
                </mat-autocomplete>
            </mat-form-field>
        </form>

        <!-- 有資料 -->
        <section class="card-list-container" *ngIf="dataSource.length">
            <div *ngFor="let item of dataSource" class="card link" (click)="doRouterPage(item)" >
                <img class="cover" [src]="item.coverAttId | fileUrl" *ngIf="item.coverAttId > 0">
                <img class="cover" [src]="'assets/image/illustration/empty-img.png'" *ngIf="!item.coverAttId">

                <div class="name-wrap">
                    <div>
                        <h2> {{ item.name }} </h2>
                        <p class="date"> {{ item.addr }}</p>
                    </div>
                    <button class="card-action" [matMenuTriggerFor]="actionMenu"
                        (click)="$event.stopPropagation()"><span class="material-symbols-outlined">
                            more_vert
                        </span></button>
                    <mat-menu #actionMenu="matMenu">
                        <button mat-menu-item (click)="doRouterPage(item)" ><span
                                class="material-symbols-outlined">preview</span>專案總覽</button>
                        <a mat-menu-item [attr.href]="'/project/edit?buildProjectId=' + item.id + '&mode=edit'">
                            <span class="material-symbols-outlined">edit</span>編輯專案
                        </a>
                        <button mat-menu-item class="danger" (click)="deleteBuildProject(item)"><span
                                class="material-symbols-outlined">delete</span>刪除專案</button>
                    </mat-menu>
                </div>

            </div>
        </section>
    </div>
    <!-- 無資料 -->
    <web-result-empty *ngIf="(!dataSource.length) && (!request.queryRequest.queryString)"
        [message]="'請點選左上角「新增專案」開始您的第一個專案'"></web-result-empty>
    <web-result-empty *ngIf="(!dataSource.length) && request.queryRequest.queryString"
        [message]="'查無資料，請重新輸入查詢條件'"></web-result-empty>
</div>
