    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">

    <!-- SEO -->
    
    <meta name="keywords" content="澐光客變系統">
    <meta name="description" content="澐光客變系統">
    <!-- Open Graph (hidden) -->

    <meta property="og:type" content="website">

    <meta property="og:title" content="澐光客變系統">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:domain" content="tslmai.org.tw">
    <meta name="twitter:title" content="澐光客變系統">
    <meta name="twitter:description" content="澐光客變系統">
    <!-- JSON-LD: Organization (GEO 信號) -->
    <script type="application/ld+json" id="org-ld">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      
      "name": "澐光客變系統",
      
      
      "logo": {
        "@type": "ImageObject",
        
      },
      "description": "澐光客變系統",
      "sameAs": []
    }
    </script>
    <!-- JSON-LD: WebSite + SearchAction (GEO/AEO 信號) -->
    <script type="application/ld+json" id="website-ld">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://tslmai.org.tw/#website",
      "name": "澐光客變系統",
      "url": "https://tslmai.org.tw",
      "publisher": {
        "@id": "https://tslmai.org.tw/#organization"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://tslmai.org.tw/news/list?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
